networks:
  dev:

services:
  db:
    image: postgres:17.4
    restart: unless-stopped
    shm_size: 256mb
    environment:
      - POSTGRES_USER=hackathon_user
      - POSTGRES_PASSWORD=123123
      - POSTGRES_DB=hackathon_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"] #дописать имя БД
      interval: 10s
      timeout: 30s
      retries: 5

    ports:
      - "144.31.241.98:5432:5432"

    networks:
      - dev

